# Configuración para perfil de desarrollo
spring.application.name=${SPRING_APPLICATION_NAME:server}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/api/docs}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/manga_db}

# Spring Boot DevTools - Hot Reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Logging más detallado en desarrollo
logging.level.root=INFO
logging.level.com.manga.server=DEBUG
logging.level.org.springframework.web=DEBUG

# Actuator - más endpoints disponibles en desarrollo
management.endpoints.web.exposure.include=health,info,metrics,env,beans

